<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h1>Usuarios</h1>

<a href="/usuarios/nuevo">Crear usuario</a>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Email</th>
    </tr>

    <tr th:each="u : ${usuarios}">
        <td th:text="${u.nombre}"></td>
        <td th:text="${u.email}"></td>
    </tr>
</table>

</body>
</html>
