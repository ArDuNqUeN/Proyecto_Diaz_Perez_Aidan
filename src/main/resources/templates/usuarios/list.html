<!DOCTYPE html>
<html>
<head>
    <title>Usuarios</title>
</head>
<body>

<h1>Lista de usuarios</h1>

<a href="/usuarios/nuevo">Crear usuario</a>

<ul>
    <li th:each="u : ${usuarios}">
        <span th:text="${u.nombre}"></span>
        -
        <span th:text="${u.email}"></span>
    </li>
</ul>

</body>
</html>
