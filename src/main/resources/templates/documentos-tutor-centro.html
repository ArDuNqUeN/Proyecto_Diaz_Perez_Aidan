<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Documentos - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <nav class="navbar">
    <a th:href="@{/panel}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="/img/logo.png" alt="Logo" style="height: 35px;">
        <span class="logo">PracticApps</span>
    </a>
    <div class="nav-links">
            <a th:href="@{/panel/tutor-centro}">Mi Panel</a>
            <a th:href="@{/panel/tutor-centro/documentos}">Documentos</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>📁 Subir Documento</h2>
            <div th:if="${mensaje}" class="alerta alerta-info" th:text="${mensaje}"></div>
            <div th:if="${error}" class="alerta alerta-error" th:text="${error}"></div>

            <form method="post" th:action="@{/panel/tutor-centro/documentos/subir}" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="tipoDocumento">Tipo de documento:</label>
                    <select id="tipoDocumento" name="tipoDocumento" required>
                        <option value="">Selecciona tipo</option>
                        <option value="Informe académico">Informe académico</option>
                        <option value="Evaluación final">Evaluación final</option>
                        <option value="Acta">Acta</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="alumno">Alumno (opcional):</label>
                    <select id="alumno" name="alumnoId">
                        <option value="">Sin alumno específico</option>
                        <option th:each="a : ${alumnos}" th:value="${a.id}" th:text="${a.nombreCompleto}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="archivo">Archivo:</label>
                    <input type="file" id="archivo" name="archivo" accept=".pdf,.docx,.jpg,.png" required>
                </div>
                <button type="submit" class="btn btn-block mt-20">
                    <span>Subir Documento</span>
                </button>
            </form>

            <h3>📋 Documentos subidos</h3>
            <table class="tabla" th:if="${!#lists.isEmpty(documentos)}">
                <thead>
                    <tr><th>Nombre</th><th>Tipo</th><th>Tamaño</th><th>Fecha</th></tr>
                </thead>
                <tbody>
                    <tr th:each="doc : ${documentos}">
                        <td th:text="${doc.nombreOriginal}">archivo.pdf</td>
                        <td th:text="${doc.tipoDocumento}">Informe</td>
                        <td th:text="${doc.tamañoLegible}">100 KB</td>
                        <td th:text="${#temporals.format(doc.fechaSubida, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                    </tr>
                </tbody>
            </table>
            <p class="aviso" th:if="${#lists.isEmpty(documentos)}">No has subido documentos todavía.</p>
        </div>
    </div>
    <footer><p>&copy; 2026 PracticApps</p></footer>
</body>
</html>
