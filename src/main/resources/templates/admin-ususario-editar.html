<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <nav class="navbar">
        <span class="logo">PracticApps</span>
        <div class="nav-links">
            <a th:href="@{/panel/admin}">Volver al Panel</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>✏️ Editar Usuario</h2>

            <form method="post" th:action="@{/panel/admin/usuarios/editar/{id}(id=${usuario.id})}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" th:value="${usuario.nombre}" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" th:value="${usuario.email}" required>
                </div>

                <div class="form-group">
                    <label for="password">Nueva contraseña (dejar vacío para no cambiar):</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label for="rol">Rol:</label>
                    <select id="rol" name="rol" required>
                        <option value="ROLE_ADMIN" th:selected="${usuario.rol == 'ROLE_ADMIN'}">Administrador</option>
                        <option value="ROLE_ALUMNO" th:selected="${usuario.rol == 'ROLE_ALUMNO'}">Alumno</option>
                        <option value="ROLE_TUTOR_EMPRESA" th:selected="${usuario.rol == 'ROLE_TUTOR_EMPRESA'}">Tutor Empresa</option>
                        <option value="ROLE_TUTOR_CENTRO" th:selected="${usuario.rol == 'ROLE_TUTOR_CENTRO'}">Tutor Centro</option>
                    </select>
                </div>

                <p>
                    <strong>Estado actual:</strong>
                    <span th:if="${usuario.activo}" style="color: #28a745;">Activo</span>
                    <span th:unless="${usuario.activo}" style="color: #dc3545;">Inactivo</span>
                </p>

                <button type="submit" class="btn btn-block mt-20">
                    <span>Guardar Cambios</span>
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PracticApps</p>
    </footer>

</body>
</html>
