<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Alumno - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
   <nav class="navbar">
    <a th:href="@{/panel}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="/img/favicon.png" alt="Logo" style="height: 35px;">
        <span class="logo">PracticApps</span>
    </a>
    <div class="nav-links">
            <a th:href="@{/panel/tutor-centro/alumnos}">Volver</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>👨‍🎓 <span th:text="${alumno.nombreCompleto}">Carlos</span></h2>
            <p>Matrícula: <strong th:text="${alumno.matricula}">A2024001</strong></p>
            <p>Teléfono: <strong th:text="${alumno.telefono}">612345678</strong></p>

            <div class="stats">
                <div class="stat-card">
                    <h3 th:text="${horasTotales}">0</h3>
                    <p>Horas validadas</p>
                </div>
                <div class="stat-card">
                    <h3 th:text="${horasPendientes}">0</h3>
                    <p>Horas pendientes</p>
                </div>
            </div>

            <h3>📋 Registros de horas</h3>
            <table class="tabla" th:if="${!#lists.isEmpty(horas)}">
                <thead>
                    <tr><th>Fecha</th><th>Horas</th><th>Descripción</th><th>Estado</th></tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${horas}">
                        <td th:text="${h.fecha}">2026-04-20</td>
                        <td th:text="${h.horas}">8</td>
                        <td th:text="${h.descripcion}">Tareas</td>
                        <td>
                            <span th:if="${h.estado.toString() == 'VALIDADA'}" style="color: green;">✅ Validada</span>
                            <span th:if="${h.estado.toString() == 'PENDIENTE'}" style="color: orange;">⏳ Pendiente</span>
                            <span th:if="${h.estado.toString() == 'RECHAZADA'}" style="color: red;">❌ Rechazada</span>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p class="aviso" th:if="${#lists.isEmpty(horas)}">No hay registros de horas.</p>
        </div>
    </div>
    <footer><p>&copy; 2026 PracticApps</p></footer>
</body>
</html>
