<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Práctica - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <nav class="navbar">
    <a th:href="@{/panel}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="/img/favicon.png" alt="Logo" style="height: 35px;">
        <span class="logo">PracticApps</span>
    </a>
    <div class="nav-links">
            <a th:href="@{/panel/admin/practicas}">Volver</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>📝 Asignar Nueva Práctica</h2>

            <form method="post" th:action="@{/panel/admin/practicas/guardar}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" name="titulo" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="fechaInicio">Fecha inicio:</label>
                    <input type="date" id="fechaInicio" name="fechaInicio" required>
                </div>

                <div class="form-group">
                    <label for="fechaFin">Fecha fin:</label>
                    <input type="date" id="fechaFin" name="fechaFin" required>
                </div>

                <div class="form-group">
                    <label for="horasPrevistas">Horas previstas:</label>
                    <input type="number" id="horasPrevistas" name="horasPrevistas" min="1" required>
                </div>

                <div class="form-group">
                    <label for="alumno">Alumno:</label>
                    <select id="alumno" name="alumnoId" required>
                        <option value="">Selecciona alumno</option>
                        <option th:each="a : ${alumnos}" th:value="${a.id}" th:text="${a.nombreCompleto}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="empresa">Empresa:</label>
                    <select id="empresa" name="empresaId" required>
                        <option value="">Selecciona empresa</option>
                        <option th:each="e : ${empresas}" th:value="${e.id}" th:text="${e.nombre}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tutorEmpresa">Tutor Empresa:</label>
                    <select id="tutorEmpresa" name="tutorEmpresaId" required>
                        <option value="">Selecciona tutor</option>
                        <option th:each="t : ${tutoresEmpresa}" th:value="${t.id}" th:text="${t.nombreCompleto}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tutorCentro">Tutor Centro:</label>
                    <select id="tutorCentro" name="tutorCentroId" required>
                        <option value="">Selecciona tutor</option>
                        <option th:each="t : ${tutoresCentro}" th:value="${t.id}" th:text="${t.nombreCompleto}"></option>
                    </select>
                </div>

                <button type="submit" class="btn btn-block mt-20">
                    <span>Guardar Práctica</span>
                </button>
            </form>
        </div>
    </div>
    <footer><p>&copy; 2026 PracticApps</p></footer>
</body>
</html>
