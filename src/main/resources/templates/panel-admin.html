<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Prácticas - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <nav class="navbar">
        <span class="logo">PracticApps</span>
        <div class="nav-links">
            <a th:href="@{/panel/admin}">Usuarios</a>
            <a th:href="@{/panel/admin/practicas}">Prácticas</a>
            <a th:href="@{/panel/admin/practicas/nueva}">+ Nueva</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>📋 Gestión de Prácticas</h2>
            <div th:if="${mensaje}" class="alerta alerta-info" th:text="${mensaje}"></div>

            <a th:href="@{/panel/admin/practicas/nueva}" class="btn mt-20">
                <span>+ Nueva Práctica</span>
            </a>

            <h3>Prácticas registradas</h3>
            <table class="tabla" th:if="${!#lists.isEmpty(practicas)}">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Alumno</th>
                        <th>Empresa</th>
                        <th>Horas</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${practicas}">
                        <td th:text="${p.titulo}">Práctica</td>
                        <td th:text="${p.alumno?.nombreCompleto} ?: 'Sin asignar'">Alumno</td>
                        <td th:text="${p.empresa?.nombre} ?: 'Sin asignar'">Empresa</td>
                        <td th:text="${p.horasPrevistas}">400</td>
                        <td>
                            <span th:if="${p.estado.toString() == 'ACTIVA'}" style="color: green;">🟢 Activa</span>
                            <span th:if="${p.estado.toString() == 'FINALIZADA'}" style="color: gray;">⚫ Finalizada</span>
                            <span th:if="${p.estado.toString() == 'CANCELADA'}" style="color: red;">🔴 Cancelada</span>
                        </td>
                        <td>
                            <a th:href="@{/panel/admin/practicas/editar/} + ${p.id}" class="btn btn-pequeno">✏️</a>
                            <form th:if="${p.estado.toString() == 'ACTIVA'}" th:action="@{/panel/admin/practicas/finalizar/} + ${p.id}" method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-pequeno" title="Finalizar práctica">🏁</button>
                            </form>
                            <form th:if="${p.estado.toString() != 'FINALIZADA' and p.estado.toString() != 'CANCELADA'}" 
                                  th:action="@{/panel/admin/practicas/cancelar/} + ${p.id}" method="post" style="display:inline;"
                                  onsubmit="return confirm('¿Cancelar esta práctica?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-pequeno btn-rojo" title="Cancelar práctica">❌</button>
                            </form>
                            <form th:action="@{/panel/admin/practicas/eliminar/} + ${p.id}" method="post" style="display:inline;" 
                                  onsubmit="return confirm('¿Eliminar esta práctica?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-pequeno btn-rojo">🗑️</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p class="aviso" th:if="${#lists.isEmpty(practicas)}">No hay prácticas registradas.</p>
        </div>
    </div>
    <footer><p>&copy; 2026 PracticApps</p></footer>
</body>
</html>
