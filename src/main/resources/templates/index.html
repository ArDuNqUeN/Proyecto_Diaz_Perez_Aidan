<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio - PractiApps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a66c2, #00bcd4);
      /* Gradiente dinámico */
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      transition: transform 0.3s ease-in-out;
    }

    .container:hover {
      transform: translateY(-10px);
    }

    h1 {
      color: #0a66c2;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    p {
      color: #555;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      position: relative;
      padding: 14px 30px;
      border-radius: 30px;
      border: 2px solid #0a66c2;
      background: #0a66c2;
      color: white;
      font-size: 18px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
      display: inline-block;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* capa de animación */
    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background: #fff;
      z-index: 0;
      transition: width 0.4s ease;
    }

    .btn:hover::before {
      width: 100%;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .btn:hover {
      background: white;
      color: #0a66c2;
    }

    .logo {
      max-width: 100%;
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

  <div class="container">
	<img src="/img/logo.png" alt="PractiApps logo" class="logo">
    <h1>Bienvenido a PractiApps</h1>
    <p>Gestiona tu experiencia de forma profesional, rápida y sencilla desde un solo lugar.</p>

    <a href="/login" class="btn">
      <span>Comenzar</span>
    </a>
  </div>

</body>
</html>
