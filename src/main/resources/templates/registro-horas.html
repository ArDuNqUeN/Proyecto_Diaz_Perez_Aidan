<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Horas - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <nav class="navbar">
    <a th:href="@{/panel}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src=/img/favicon.png alt="Logo" style="height: 35px;">
        <span class="logo">PracticApps</span>
    </a>
    <div class="nav-links">
            <a th:href="@{/panel/alumno}">Volver al Panel</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>⏱️ Registrar Horas de Prácticas</h2>

            <!-- Mensaje de error -->
            <div th:if="${error}" class="alerta alerta-error" th:text="${error}">
                Error
            </div>

            <!-- Mensaje de éxito -->
            <div th:if="${mensaje}" class="alerta alerta-info" th:text="${mensaje}">
                Éxito
            </div>

            <form method="post" th:action="@{/panel/alumno/registrar-horas}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="practica">Práctica:</label>
                    <select id="practica" name="practicaId" required>
                        <option value="">Selecciona una práctica</option>
                        <option th:each="practica : ${practicas}" 
                                th:value="${practica.id}"
                                th:text="${practica.titulo} + ' - ' + ${practica.empresa.nombre}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-group">
                    <label for="horas">Horas trabajadas:</label>
                    <input type="number" id="horas" name="horas" min="1" max="12" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción de tareas:</label>
                    <textarea id="descripcion" name="descripcion" rows="4" 
                              placeholder="Describe brevemente las tareas realizadas hoy..."></textarea>
                </div>

                <button type="submit" class="btn btn-block mt-20">
                    <span>Guardar Registro</span>
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PracticApps</p>
    </footer>

</body>
</html>
