<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Evaluaciones - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

   <nav class="navbar">
    <a th:href="@{/panel}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="/img/logo.png" alt="Logo" style="height: 35px;">
        <span class="logo">PracticApps</span>
    </a>
    <div class="nav-links">
            <a th:href="@{/panel/alumno}">Volver al Panel</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>📊 Mis Evaluaciones</h2>

            <table class="tabla" th:if="${!#lists.isEmpty(evaluaciones)}">
                <thead>
                    <tr>
                        <th>Evaluador</th>
                        <th>Tipo</th>
                        <th>Nota</th>
                        <th>Comentario</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="eval : ${evaluaciones}">
                        <td th:text="${eval.nombreEvaluador}">Roberto</td>
                        <td th:text="${eval.tipoEvaluador}">TUTOR_EMPRESA</td>
                        <td>
                            <strong th:text="${eval.nota}">8.5</strong>
                        </td>
                        <td th:text="${eval.comentario}">Buen trabajo</td>
                        <td th:text="${#temporals.format(eval.fechaEvaluacion, 'dd/MM/yyyy')}">15/03/2026</td>
                    </tr>
                </tbody>
            </table>

            <p class="aviso" th:if="${#lists.isEmpty(evaluaciones)}">
                No tienes evaluaciones registradas todavía.
            </p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PracticApps - Todos los derechos reservados</p>
    </footer>

</body>
</html>
