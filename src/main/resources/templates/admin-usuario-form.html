<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Usuario - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        .campos-extra { display: none; }
        .campos-extra.visible { display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <span class="logo">PracticApps</span>
        <div class="nav-links">
            <a th:href="@{/panel/admin}">Volver al Panel</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>👤 Crear Nuevo Usuario</h2>

            <div th:if="${error}" class="alerta alerta-error" th:text="${error}"></div>

            <form method="post" th:action="@{/panel/admin/usuarios/guardar}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Campos comunes a todos los roles -->
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="rol">Rol:</label>
                    <select id="rol" name="rol" required onchange="mostrarCamposExtra()">
                        <option value="">Selecciona un rol</option>
                        <option value="ROLE_ADMIN">Administrador</option>
                        <option value="ROLE_ALUMNO">Alumno</option>
                        <option value="ROLE_TUTOR_EMPRESA">Tutor Empresa</option>
                        <option value="ROLE_TUTOR_CENTRO">Tutor Centro</option>
                    </select>
                </div>

                <!-- Campos extra para Alumno -->
                <div id="campos-alumno" class="campos-extra">
                    <div class="form-group">
                        <label for="matricula">Matrícula:</label>
                        <input type="text" id="matricula" name="matricula">
                    </div>
                    <div class="form-group">
                        <label for="apellidos">Apellidos:</label>
                        <input type="text" id="apellidos" name="apellidos">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono:</label>
                        <input type="text" id="telefono" name="telefono">
                    </div>
                </div>

                <!-- Campos extra para Tutor Empresa -->
                <div id="campos-tutor-empresa" class="campos-extra">
                    <div class="form-group">
                        <label for="cargo">Cargo:</label>
                        <input type="text" id="cargo" name="cargo">
                    </div>
                    <div class="form-group">
                        <label for="telefono-tutor">Teléfono:</label>
                        <input type="text" id="telefono-tutor" name="telefono">
                    </div>
                </div>

                <!-- Campos extra para Tutor Centro / Admin -->
                <div id="campos-centro" class="campos-extra">
                    <div class="form-group">
                        <label for="departamento">Departamento:</label>
                        <input type="text" id="departamento" name="departamento">
                    </div>
                    <div class="form-group">
                        <label for="despacho">Despacho:</label>
                        <input type="text" id="despacho" name="despacho">
                    </div>
                </div>

                <button type="submit" class="btn btn-block mt-20">
                    <span>Guardar Usuario</span>
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PracticApps</p>
    </footer>

    <script>
        function mostrarCamposExtra() {
            // Ocultar todos
            document.querySelectorAll('.campos-extra').forEach(el => el.classList.remove('visible'));
            
            // Mostrar según el rol seleccionado
            var rol = document.getElementById('rol').value;
            if (rol === 'ROLE_ALUMNO') {
                document.getElementById('campos-alumno').classList.add('visible');
            } else if (rol === 'ROLE_TUTOR_EMPRESA') {
                document.getElementById('campos-tutor-empresa').classList.add('visible');
            } else if (rol === 'ROLE_TUTOR_CENTRO' || rol === 'ROLE_ADMIN') {
                document.getElementById('campos-centro').classList.add('visible');
            }
        }
    </script>

</body>
</html>
