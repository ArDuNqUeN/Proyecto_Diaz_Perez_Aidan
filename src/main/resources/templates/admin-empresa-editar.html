<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Empresa - PracticApps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <nav class="navbar">
    <a th:href="@{/panel}" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="/img/logo.png" alt="Logo" style="height: 35px;">
        <span class="logo">PracticApps</span>
    </a>
    <div class="nav-links">
            <a th:href="@{/panel/admin/empresas}">Volver</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>✏️ Editar Empresa</h2>
            <form method="post" th:action="@{/panel/admin/empresas/editar/} + ${empresa.id}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" th:value="${empresa.nombre}" required>
                </div>
                <div class="form-group">
                    <label for="direccion">Dirección:</label>
                    <input type="text" id="direccion" name="direccion" th:value="${empresa.direccion}" required>
                </div>
                <div class="form-group">
                    <label for="sector">Sector:</label>
                    <input type="text" id="sector" name="sector" th:value="${empresa.sector}" required>
                </div>
                <div class="form-group">
                    <label for="cif">CIF:</label>
                    <input type="text" id="cif" name="cif" th:value="${empresa.cif}" required>
                </div>
                <button type="submit" class="btn btn-block mt-20"><span>Guardar Cambios</span></button>
            </form>
        </div>
    </div>
    <footer><p>&copy; 2026 PracticApps</p></footer>
</body>
</html>
